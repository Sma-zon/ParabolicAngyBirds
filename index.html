<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parabolic Angry Birds - Educational Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Parabolic Angry Birds</h1>
            <div class="info">
                <span id="levelDisplay">Level: 1</span>
                <span id="scoreDisplay">Score: 0</span>
                <span id="attemptsDisplay">Shots: Unlimited</span>
            </div>
        </header>
        
        <main>
            <canvas id="gameCanvas" width="1000" height="600"></canvas>
            
            <div class="control-panel">
                <h2>Enter Parabolic Equation</h2>
                <p class="equation-format">Format: y = -a(x-h)^2 + k</p>
                <div class="input-mode-tabs">
                    <button id="fullEquationTab" class="mode-tab active">Full Equation</button>
                    <button id="splitInputsTab" class="mode-tab">a / h / k Inputs</button>
                </div>

                <div id="fullEquationPanel" class="input-panel active">
                    <div class="input-group">
                        <label for="equationInput">Full equation:</label>
                        <input
                            type="text"
                            id="equationInput"
                            class="equation-input"
                            value="y = -0.0012(x-430)^2 + 150"
                        >
                    </div>
                </div>

                <div id="splitInputsPanel" class="input-panel">
                    <div class="input-group">
                        <label>a (vertical stretch): <input type="text" id="inputA" value="0.0012"></label>
                        <label>h (horizontal shift): <input type="text" id="inputH" value="430"></label>
                        <label>k (vertical shift): <input type="text" id="inputK" value="150"></label>
                    </div>
                </div>
                <div class="button-group">
                    <button id="shootBtn" class="btn-primary">🚀 SHOOT</button>
                    <button id="nextLevelBtn" class="btn-secondary">➡️ Next Level</button>
                </div>
                <div id="messageBox" class="message-box"></div>
            </div>
        </main>
        
        <footer>
            <p>Master physics and algebra while having fun! Enter the correct parabolic equation to guide your bird.</p>
        </footer>
    </div>
    
    <!-- Audio elements -->
    <audio id="shootSound" preload="auto">
        <source src="sounds/shoot.mp3" type="audio/mpeg">
    </audio>
    <audio id="collisionSound" preload="auto">
        <source src="sounds/collision.mp3" type="audio/mpeg">
    </audio>
    <audio id="successSound" preload="auto">
        <source src="sounds/success.mp3" type="audio/mpeg">
    </audio>
    <audio id="failSound" preload="auto">
        <source src="sounds/fail.mp3" type="audio/mpeg">
    </audio>
    
    <script src="js/sound-manager.js"></script>
    <script src="js/particle-system.js"></script>
    <script src="js/game-objects.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
